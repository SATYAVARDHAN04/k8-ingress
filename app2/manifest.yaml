apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-2
  labels:
    purpose: ingress
    app: app2
    project: roboshop
spec:
  replicas: 2
  selector:
    matchLabels:
      purpose: ingress
      app: app2
      project: roboshop
  template:
    metadata:
      labels:
        purpose: ingress
        app: app2
        project: roboshop
    spec:
      containers:
      - name: app2
        image: satyology/app2
---
apiVersion: v1
kind: Service
metadata:
  name: app-2
  labels:
    purpose: ingress
    app: app2
    project: roboshop
spec:
  selector:
    purpose: ingress
    app: app2
    project: roboshop
  ports:
  - protocol: TCP
    port: 80 #service port
    targetPort: 80 #container port (nginx opens 80 container port)
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-2
  annotations:
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS": 443}]'
    alb.ingress.kubernetes.io/certificate-arn: arn:xxx
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
spec:
  ingressClassName: alb
  rules:
  - host: "app2.satyology.site"
    http:
      paths:
      - pathType: Prefix
        path: "/"
        backend:
          service:
            name: app-2
            port:
              number: 80 # app2 service port number