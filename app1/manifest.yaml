apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-1
  labels:
    purpose: ingress
    app: app1
    project: roboshop
spec:
  replicas: 2
  selector:
    matchLabels:
      purpose: ingress
      app: app1
      project: roboshop
  template:
    metadata:
      labels:
        purpose: ingress
        app: app1
        project: roboshop
    spec:
      containers:
      - name: app1
        image: satyology/app1
---
apiVersion: v1
kind: Service
metadata:
  name: app-1
  labels:
    purpose: ingress
    app: app1
    project: roboshop
spec:
  selector:
    purpose: ingress
    app: app1
    project: roboshop
  ports:
  - protocol: TCP
    port: 80 #service port
    targetPort: 80 #container port (nginx opens 80 container port)
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress
  annotations:
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS": 443}]'
    alb.ingress.kubernetes.io/certificate-arn: arn:xxx
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
spec:
  rules:
  - host: "app1.satyology.site"
    http:
      paths:
      - pathType: Prefix
        path: "/"
        backend:
          service:
            name: app-1
            port:
              number: 80 # app1 service port number